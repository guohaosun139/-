<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>夜归小站 Night Station - MVP</title>
    <style>
      :root {
        --bg-1: #0a1022;
        --bg-2: #16213d;
        --panel: #1f2b48;
        --panel-soft: #2a3a5f;
        --text: #ecf1ff;
        --muted: #aebbd9;
        --accent: #8fd6ff;
        --good: #8fffc0;
        --warn: #ffd27d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, #22325f 0%, var(--bg-1) 55%, #050913 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }

      .station {
        width: min(920px, 100%);
        background: linear-gradient(180deg, rgba(28, 43, 76, 0.96), rgba(15, 24, 45, 0.96));
        border: 1px solid rgba(143, 214, 255, 0.25);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
      }

      .header {
        padding: 18px 22px;
        border-bottom: 1px solid rgba(143, 214, 255, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .title {
        margin: 0;
        font-size: 1.15rem;
      }

      .meta {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .scene {
        position: relative;
        height: 270px;
        background: linear-gradient(180deg, var(--bg-2), #0d1731 65%, #091022);
        border-bottom: 1px solid rgba(143, 214, 255, 0.15);
      }

      .moon {
        position: absolute;
        top: 26px;
        right: 34px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #f2f5ff;
        opacity: 0.8;
        box-shadow: 0 0 20px rgba(242, 245, 255, 0.8);
      }

      .platform {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 80px;
        background: linear-gradient(180deg, #1e2f57, #142242);
      }

      .visitor {
        position: absolute;
        left: 120px;
        bottom: 58px;
        width: 72px;
        height: 112px;
        background: #324b82;
        border-radius: 22px 22px 16px 16px;
        border: 2px solid rgba(236, 241, 255, 0.38);
      }

      .visitor::before {
        content: "";
        position: absolute;
        top: -42px;
        left: 14px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #d9e4ff;
      }

      .content {
        display: grid;
        grid-template-columns: 1.15fr 1fr;
        gap: 16px;
        padding: 18px;
      }

      .card {
        background: rgba(42, 58, 95, 0.72);
        border: 1px solid rgba(143, 214, 255, 0.18);
        border-radius: 14px;
        padding: 14px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .label {
        color: var(--muted);
      }

      .value {
        font-weight: 700;
      }

      .value.good {
        color: var(--good);
      }

      .story {
        min-height: 80px;
        line-height: 1.6;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      button {
        border: 1px solid rgba(143, 214, 255, 0.35);
        background: #22335a;
        color: var(--text);
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.08s ease, background 0.15s ease;
      }

      button:hover {
        background: #2b406f;
      }

      button:active {
        transform: translateY(1px);
      }

      .reset-btn {
        border-color: rgba(255, 210, 125, 0.55);
        background: #4f3a1f;
      }

      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.86rem;
      }

      @media (max-width: 760px) {
        .content {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="station">
      <header class="header">
        <h1 class="title">夜归小站 Night Station · 第一阶段 MVP</h1>
        <span class="meta">夜色深了，给晚归的人一杯温热的安慰</span>
      </header>

      <section class="scene" aria-label="夜晚小站场景">
        <div class="moon" aria-hidden="true"></div>
        <div class="visitor" aria-label="访客"></div>
        <div class="platform" aria-hidden="true"></div>
      </section>

      <section class="content">
        <article class="card">
          <div class="stat-row">
            <span class="label">当前情绪值</span>
            <span id="moodValue" class="value">0</span>
          </div>
          <div class="stat-row">
            <span class="label">微光数量</span>
            <span id="glowValue" class="value">0</span>
          </div>
          <p id="storyText" class="story">访客沉默地坐在站台边，似乎在等一句可以落地的话。</p>
          <p id="statusHint" class="hint">提示：情绪达到 60 解锁故事，达到 90 获得 1 点微光。</p>
        </article>

        <aside class="card">
          <div class="actions">
            <button type="button" data-drink="tea">热茶（+15）</button>
            <button type="button" data-drink="coffee">咖啡（+5）</button>
            <button type="button" data-drink="sweetSoup">糖水（+10）</button>
            <button id="resetBtn" type="button" class="reset-btn">重新开始一天</button>
          </div>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
