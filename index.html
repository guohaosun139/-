<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夜归小站 Night Station</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101827;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      width: min(720px, 100%);
      background: #172033;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }
    h1 { margin-top: 0; }
    .scene {
      min-height: 180px;
      border-radius: 14px;
      background: linear-gradient(180deg, #1e293b, #020617);
      display: grid;
      place-items: center;
      margin: 18px 0;
    }
    .visitor {
      width: 72px;
      height: 96px;
      border-radius: 36px 36px 16px 16px;
      background: #94a3b8;
    }
    .story {
      line-height: 1.7;
      background: #0f172a;
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      margin: 6px;
      background: #fde68a;
      color: #111827;
      font-size: 15px;
    }
    #resetBtn { background: #c7d2fe; }
  </style>
</head>
<body>
  <main>
    <h1>夜归小站 Night Station</h1>
    <p>当前情绪值：<strong id="moodValue">30</strong></p>
    <p>微光数量：<strong id="glowValue">0</strong></p>

    <section class="scene">
      <div class="visitor"></div>
    </section>

    <div id="storyText" class="story">
      访客沉默地坐在站台边，似乎在等一句可以落地的话。
    </div>

    <p id="statusHint">提示：情绪达到 60 解锁故事，达到 90 获得 1 点微光。</p>

    <button type="button" data-drink="tea">热茶（+15）</button>
    <button type="button" data-drink="coffee">咖啡（+5）</button>
    <button type="button" data-drink="sweetSoup">糖水（+10）</button>
    <button type="button" id="resetBtn">重新开始一天</button>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
